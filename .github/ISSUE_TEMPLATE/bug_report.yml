name: "🐛 Bug Report"
description: "Report a bug to help us improve."
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below as completely as possible.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the tool are you using? (e.g. v1.0.0, commit hash)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment & Context
      description: OS, Node version, logs, etc.
  - type: checkboxes
    id: checks
    attributes:
      label: Final Checks
      options:
        - label: I have searched existing issues to ensure this hasn't been reported.
          required: true
        - label: I am using the latest version of the tool.
          required: true
