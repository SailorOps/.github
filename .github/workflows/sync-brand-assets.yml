# ──────────────────────────────────────────────────────────────
# ⚓ Still Systems Brand Asset Sync
# ──────────────────────────────────────────────────────────────
# Distributes brand assets from the central .github repo to
# every repository in the organization. Detects changes,
# delivers via PR or direct push, and reports results.
#
# Prerequisites:
# 1. Org secret GORELEASER_TOKEN (PAT with repo + read:org scopes)
# 2. Brand assets stored in /brand/ at repo root
# ──────────────────────────────────────────────────────────────

name: "⚓ Sync Brand Assets"

on:
  push:
    branches: [main]
    paths:
      - "brand/**"
      - "brand-sync.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without pushing"
        type: boolean
        default: false
      target_repo:
        description: "Sync to a specific repo only (leave empty for all)"
        type: string
        default: ""
      sync_mode:
        description: "Delivery method"
        type: choice
        options:
          - pr
          - direct
        default: pr
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  GIT_AUTHOR_NAME: "stillsystems-bot"
  GIT_AUTHOR_EMAIL: "bot@stillsystems.io"
  GIT_COMMITTER_NAME: "stillsystems-bot"
  GIT_COMMITTER_EMAIL: "bot@stillsystems.io"

jobs:
  sync:
    name: Distribute Brand Assets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Load sync configuration
        id: config
        run: |
          CONFIG="brand-sync.yml"
          if [ -f "$CONFIG" ]; then
            echo "✓ Found brand-sync.yml"
            echo "target_path=$(yq '.sync.target_path // ".github/brand"' "$CONFIG")" >> "$GITHUB_OUTPUT"
            echo "sync_mode=$(yq '.sync.mode // "pr"' "$CONFIG")" >> "$GITHUB_OUTPUT"
            echo "pr_branch=$(yq '.sync.pr_branch // "stillsystems/sync-brand-assets"' "$CONFIG")" >> "$GITHUB_OUTPUT"
            echo "skip_archived=$(yq '.repositories.skip_archived // true' "$CONFIG")" >> "$GITHUB_OUTPUT"
            echo "skip_forks=$(yq '.repositories.skip_forks // true' "$CONFIG")" >> "$GITHUB_OUTPUT"
            EXCLUDES=$(yq '.repositories.exclude // [".github"] | join(",")' "$CONFIG")
            echo "exclude_repos=$EXCLUDES" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No brand-sync.yml found — using defaults"
            echo "target_path=.github/brand" >> "$GITHUB_OUTPUT"
            echo "sync_mode=pr" >> "$GITHUB_OUTPUT"
            echo "pr_branch=stillsystems/sync-brand-assets" >> "$GITHUB_OUTPUT"
            echo "skip_archived=true" >> "$GITHUB_OUTPUT"
            echo "skip_forks=true" >> "$GITHUB_OUTPUT"
            echo "exclude_repos=.github" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate brand directory
        run: |
          if [ ! -d "brand" ]; then
            echo "::error::Brand directory 'brand/' not found"
            exit 1
          fi
          ASSET_COUNT=$(find brand/ -type f -not -name '.gitkeep' | wc -l)
          echo "Found $ASSET_COUNT brand asset(s) to sync"

      - name: Sync brand assets across org
        env:
          GH_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          TARGET_REPO: ${{ inputs.target_repo || '' }}
          SYNC_MODE: ${{ inputs.sync_mode || steps.config.outputs.sync_mode }}
          TARGET_PATH: ${{ steps.config.outputs.target_path }}
          PR_BRANCH: ${{ steps.config.outputs.pr_branch }}
          EXCLUDE_REPOS: ${{ steps.config.outputs.exclude_repos }}
          SKIP_ARCHIVED: ${{ steps.config.outputs.skip_archived }}
          SKIP_FORKS: ${{ steps.config.outputs.skip_forks }}
        run: |
          chmod +x scripts/sync-brand-assets.sh
          ./scripts/sync-brand-assets.sh
