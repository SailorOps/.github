name: ⚓ Auto-Merge Trusted PRs

on:
  pull_request:
    types: [opened, reopened, synchronized, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to handle manually"
        required: false
        type: string
  workflow_run:
    workflows: ["⚓ Sync Brand Assets"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-handle:
    runs-on: ubuntu-latest
    # Only run for trusted actors or specific labels
    if: >
      github.event.pull_request.user.login == 'billy' ||
      github.event.pull_request.user.login == 'sailorops-bot' ||
      github.event.pull_request.user.login == 'app/github-actions' ||
      contains(github.event.pull_request.labels.*.name, 'brand-sync') ||
      contains(github.event.pull_request.labels.*.name, 'auto-merge')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-approve and Enable Auto-merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
        run: |
          # Determine PR URL
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_URL=$(gh pr view "${{ github.event.inputs.pr_number }}" --json url --jq .url)
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            # Find the most recent PR created by the bot
            PR_URL=$(gh pr list --author "sailorops-bot" --state open --limit 1 --json url --jq '.[0].url // empty')
          else
            PR_URL=${{ github.event.pull_request.html_url }}
          fi

          if [ -z "$PR_URL" ]; then
            echo "No PR found to handle."
            exit 0
          fi

          echo "Handling PR: $PR_URL"
          gh pr review "$PR_URL" --approve || echo "Could not approve"
          gh pr merge "$PR_URL" --auto --merge || echo "Could not enable auto-merge"
