name: Reusable Go CI

on:
  workflow_call:
    inputs:
      go-version:
        required: false
        type: string
        default: '1.24.x'
      working-directory:
        required: false
        type: string
        default: '.'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ${{ inputs.working-directory }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - name: Run Tests
        working-directory: ${{ inputs.working-directory }}
        run: go test -v -race ./...

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  notify-failure:
    name: Notify Failure
    needs: [lint, test, vulnerability-scan]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report Incident
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = `🚨 Incident: Go CI failed in ${context.repo.owner}/${context.repo.repo}`;
            const issueBody = `
            ### 🧱 Still Systems Incident Report
            
            **Repository**: ${context.repo.owner}/${context.repo.repo}
            **Workflow**: ${context.workflow}
            **Run**: [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            ---
            *This issue was automatically generated by the global monitoring infrastructure.*
            `;
            
            await github.rest.issues.create({
              owner: 'stillsystems',
              repo: 'ops-center',
              title: issueTitle,
              body: issueBody,
              labels: ['incident', 'ci-failure']
            });

