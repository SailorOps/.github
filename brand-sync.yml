# ⚓ SailorOps Brand Sync Configuration
sync:
  target_path: ".github/brand"      # Where assets land in each repo
  mode: pr                          # "pr" or "direct"
  pr_branch: "sailorops/sync-brand-assets"

repositories:
  skip_archived: true
  skip_forks: true
  exclude:
    - ".github"
    # - "legacy-project"
